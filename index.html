<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PostHog Engineering Impact</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  /* ── Reset & Base ─────────────────────────────────────────── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100vh; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0f0f0f; color: #e4e4e7;
  }

  /* ── Layout ───────────────────────────────────────────────── */
  .app {
    display: flex; flex-direction: column;
    height: 100vh; padding: 20px 28px 12px;
  }
  header { text-align: center; margin-bottom: 16px; flex-shrink: 0; }
  header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  header p  { font-size: 13px; color: #71717a; margin-top: 3px; }

  .dashboard {
    display: flex; gap: 24px;
    flex: 1; min-height: 0;
  }

  /* ── Chart Panel ──────────────────────────────────────────── */
  .chart-panel {
    flex: 0 0 60%; display: flex; align-items: center; justify-content: center;
    background: #18181b; border-radius: 12px; padding: 20px 24px;
    position: relative;
  }
  .chart-panel canvas { width: 100% !important; height: 100% !important; }

  /* ── Card Panel ───────────────────────────────────────────── */
  .card-panel {
    flex: 0 0 38%; display: flex; flex-direction: column;
    background: #18181b; border-radius: 12px; padding: 24px 26px;
    justify-content: center;
  }

  .card-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
  }
  .card-header img {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid #6366f1;
  }
  .card-header .meta { display: flex; flex-direction: column; }
  .card-header .username {
    font-size: 17px; font-weight: 600; color: #fff;
  }
  .card-header .rank-badge {
    display: inline-block; margin-top: 3px;
    font-size: 11px; font-weight: 600; color: #6366f1;
    background: rgba(99,102,241,0.12); padding: 2px 8px;
    border-radius: 6px; width: fit-content;
  }

  /* Impact circle */
  .impact-block { text-align: center; margin-bottom: 18px; }
  .impact-number {
    font-size: 52px; font-weight: 800; color: #6366f1;
    line-height: 1;
  }
  .impact-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: #71717a; margin-top: 2px;
  }

  /* Mini progress bars */
  .score-bars {
    display: flex; gap: 12px; margin-bottom: 18px;
  }
  .score-bar-group { flex: 1; }
  .score-bar-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #a1a1aa; margin-bottom: 4px;
  }
  .score-bar-track {
    height: 7px; background: #27272a; border-radius: 4px; overflow: hidden;
  }
  .score-bar-fill {
    height: 100%; border-radius: 4px; transition: width 0.4s ease;
  }
  .score-bar-fill.quality { background: #6366f1; }
  .score-bar-fill.review  { background: #22d3ee; }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px 16px; margin-bottom: 16px;
  }
  .stat-item { }
  .stat-value { font-size: 18px; font-weight: 700; color: #fff; }
  .stat-label { font-size: 11px; color: #71717a; }

  /* Summary */
  .summary {
    font-size: 12.5px; line-height: 1.55; color: #a1a1aa;
    font-style: italic; border-top: 1px solid #27272a;
    padding-top: 14px;
  }

  /* ── Footer ───────────────────────────────────────────────── */
  footer {
    text-align: center; font-size: 11px; color: #71717a;
    padding-top: 10px; flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>PostHog Engineering Impact</h1>
    <p>Top 5 most impactful engineers · Last 90 days</p>
  </header>

  <div class="dashboard">
    <!-- Left: Chart -->
    <div class="chart-panel">
      <canvas id="chart"></canvas>
    </div>

    <!-- Right: Engineer Card -->
    <div class="card-panel" id="card">
      <div class="card-header">
        <img id="avatar" src="" alt="">
        <div class="meta">
          <span class="username" id="username"></span>
          <span class="rank-badge" id="rank-badge"></span>
        </div>
      </div>

      <div class="impact-block">
        <div class="impact-number" id="impact-number"></div>
        <div class="impact-label">Impact Score</div>
      </div>

      <div class="score-bars">
        <div class="score-bar-group">
          <div class="score-bar-label">
            <span>Quality Score</span>
            <span id="quality-pct"></span>
          </div>
          <div class="score-bar-track">
            <div class="score-bar-fill quality" id="quality-bar"></div>
          </div>
        </div>
        <div class="score-bar-group">
          <div class="score-bar-label">
            <span>Review Score</span>
            <span id="review-pct"></span>
          </div>
          <div class="score-bar-track">
            <div class="score-bar-fill review" id="review-bar"></div>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="stat-prs"></div>
          <div class="stat-label">PRs Merged</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-size"></div>
          <div class="stat-label">Avg PR Focus</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-reviews"></div>
          <div class="stat-label">Reviews Given</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-turnaround"></div>
          <div class="stat-label">Avg Turnaround</div>
        </div>
      </div>

      <div class="summary" id="summary"></div>
    </div>
  </div>

  <footer>Impact = code quality (50%) + review depth (50%). Bots excluded. Last updated: <span id="last-updated">Feb 20, 2026</span></footer>
</div>

<script>
(async function () {
  /* ── Load data ──────────────────────────────────────────── */
  const resp = await fetch('data.json');
  const data = await resp.json();
  const engineers = data.engineers;          // already sorted by rank

  /* ── Populate card ──────────────────────────────────────── */
  function showEngineer(idx) {
    const e = engineers[idx];
    document.getElementById('avatar').src = e.avatar_url;
    document.getElementById('username').textContent = e.username;
    document.getElementById('rank-badge').textContent = `Rank #${e.rank}`;
    document.getElementById('impact-number').textContent = e.impact_score.toFixed(2);

    const qPct = (e.quality_score * 100).toFixed(0);
    const rPct = (e.review_score * 100).toFixed(0);
    document.getElementById('quality-pct').textContent = qPct + '%';
    document.getElementById('review-pct').textContent = rPct + '%';
    document.getElementById('quality-bar').style.width = qPct + '%';
    document.getElementById('review-bar').style.width = rPct + '%';

    document.getElementById('stat-prs').textContent = e.prs_merged;
    document.getElementById('stat-size').textContent = e.avg_pr_size.toLocaleString() + ' lines';
    document.getElementById('stat-reviews').textContent = e.reviews_given;
    document.getElementById('stat-turnaround').textContent = e.avg_review_turnaround_hrs + 'h';

    document.getElementById('summary').textContent = e.summary;

    // Highlight selected bar
    highlightBar(idx);
  }

  /* ── Chart ──────────────────────────────────────────────── */
  const labels = engineers.map(e => e.username);
  const qualityData = engineers.map(e => +(e.quality_score * 0.5).toFixed(4));
  const reviewData  = engineers.map(e => +(e.review_score  * 0.5).toFixed(4));

  const ctx = document.getElementById('chart').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Code Quality',
          data: qualityData,
          backgroundColor: qualityData.map(() => '#6366f1'),
          borderRadius: { topLeft: 0, bottomLeft: 4, topRight: 0, bottomRight: 4 },
          borderSkipped: false,
        },
        {
          label: 'Review Depth',
          data: reviewData,
          backgroundColor: reviewData.map(() => '#22d3ee'),
          borderRadius: { topLeft: 4, bottomLeft: 0, topRight: 4, bottomRight: 0 },
          borderSkipped: false,
        },
      ],
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { right: 8 } },
      scales: {
        x: {
          stacked: true,
          max: 1,
          ticks: { color: '#71717a', font: { size: 11 }, callback: v => (v * 100).toFixed(0) + '%' },
          grid: { color: '#27272a' },
          border: { display: false },
        },
        y: {
          stacked: true,
          ticks: { color: '#e4e4e7', font: { size: 13, weight: '600' } },
          grid: { display: false },
          border: { display: false },
        },
      },
      plugins: {
        legend: {
          labels: { color: '#a1a1aa', font: { size: 11 }, usePointStyle: true, pointStyle: 'rectRounded', padding: 16 },
        },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.dataset.label}: ${(ctx.raw * 100).toFixed(1)}%`,
          },
        },
      },
      onClick(evt, elements) {
        if (elements.length) showEngineer(elements[0].index);
      },
      onHover(evt, elements) {
        evt.native.target.style.cursor = elements.length ? 'pointer' : 'default';
      },
    },
  });

  function highlightBar(selectedIdx) {
    chart.data.datasets[0].backgroundColor = engineers.map((_, i) =>
      i === selectedIdx ? '#6366f1' : 'rgba(99,102,241,0.25)'
    );
    chart.data.datasets[1].backgroundColor = engineers.map((_, i) =>
      i === selectedIdx ? '#22d3ee' : 'rgba(34,211,238,0.25)'
    );
    chart.update();
  }

  /* ── Init ───────────────────────────────────────────────── */
  showEngineer(0);
})();
</script>
</body>
</html>
